<div class="nav-items">
  {%- for path in include.paths -%}
  {%- assign hyperpage = site.pages | where: "path", path | first -%}
  {%- if hyperpage.title %}
  <a class="nav-item" href="{{ hyperpage.url | relative_url }}">{{ hyperpage.title | escape }}</a>
  {%- endif -%}
  {%- endfor %}
  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme" title="Auto theme (click for dark)">
    <span class="theme-toggle-icon">🌗</span>
  </button>
</div>
